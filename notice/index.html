<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김나오 · 업보</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Gowun+Batang:wght@400;700&family=Parisienne&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>

:root{
  --ink:#232223; --bg:#ffffff; --paper:#ffffff; --soft:#a7989a; --line:#efe7e8;
  --pink:#80011f; --pink-dark:#5a0015; --pink-soft:#f8e8eb;
  --blue:#a8475a; --blue-dark:#7a2435; --blue-soft:#f7edef;
  --serif:'Playfair Display','Gowun Batang',serif;
  --serif-ko:'Gowun Batang',serif;
  --script:'Parisienne',cursive;
  --script-ko:'Nanum Pen Script',cursive;
  --ui:'Pretendard','Noto Sans KR',sans-serif;
  --max:1040px;
}
body.dark{
  --ink:#f0e6e7; --bg:#15100f; --paper:#1e1716; --soft:#a08e90; --line:#352b2a;
  --pink:#e36a82; --pink-dark:#f2a3b2; --pink-soft:#2a1418;
  --blue:#d98a99; --blue-dark:#f0b5c0; --blue-soft:#2a1418;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;background:#f5f3f4;}
html:has(body.dark){background:#0a0e13;}
.sheet{background:var(--bg);max-width:1200px;margin:34px auto 0;box-shadow:0 26px 80px rgba(20,30,50,.26);overflow:hidden;transition:background .25s;}
@media(max-width:1260px){.sheet{margin:16px 14px 0;}}
body{font-family:var(--ui);background:transparent;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px;}
#fx{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
#fx .fxfb{position:absolute;bottom:-40px;color:var(--pink);opacity:0;animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-106vh) rotate(40deg);opacity:0}}
@media (prefers-reduced-motion: reduce){#fx{display:none}}
main{position:relative;z-index:1;}
.topbar{}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;padding-top:18px;padding-bottom:14px;gap:16px;}
.social{display:flex;gap:8px;flex:1;}
.social a{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--ink);transition:.16s;}
.social a:hover{background:var(--pink-soft);color:var(--pink-dark);}
.brand{text-align:center;line-height:1;flex-shrink:0;}
.brand .logo{font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:.5px;}
.brand .logo em{font-family:var(--script);font-style:normal;color:var(--pink);font-size:36px;margin-left:1px;}
.brand .tagline{font-size:11px;color:var(--soft);margin-top:7px;}
.topbar .right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end;}
.btn-join{border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:12.5px;font-weight:700;color:var(--ink);transition:.16s;}
.btn-join:hover{background:var(--pink);color:#fff;border-color:var(--pink);}
.theme-switch{width:24px;height:34px;border-radius:999px;border:1.5px solid var(--line);background:var(--pink-soft);position:relative;flex-shrink:0;padding:0;}
.theme-switch .knob{position:absolute;left:2px;top:2px;width:17px;height:17px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:top .22s;}
body.dark .theme-switch .knob{top:13px;background:var(--paper);}
.nav{}
.nav .wrap{display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap;padding-top:14px;padding-bottom:14px;}
.nav a{font-family:var(--serif-ko);font-size:16px;font-weight:700;color:var(--ink);transition:.16s;}
.nav a:hover{color:var(--pink-dark);}
.nav a.active{color:var(--pink-dark);}
.nav a.script{font-family:var(--script-ko);font-size:23px;color:var(--pink);font-weight:400;}
.sections{padding-top:34px;padding-bottom:54px;}
.sec-head{display:flex;align-items:baseline;gap:13px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:22px;}
.sec-head .en{font-family:var(--serif);font-weight:700;font-size:23px;}
.sec-head .ko{font-family:var(--script-ko);font-size:24px;color:var(--pink);line-height:1;}
.sec-head .more{margin-left:auto;font-size:11px;color:var(--soft);letter-spacing:1.5px;align-self:center;}
footer{text-align:center;padding:36px 20px 46px;color:var(--soft);font-size:12px;line-height:1.85;font-family:var(--serif-ko);}
.iq-ov{position:fixed;inset:0;background:rgba(20,40,50,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:400;padding:20px;}
.iq-ov.on{display:flex;}
.iq-modal{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:26px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(20,40,50,.3);}
.iq-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--pink-dark);}
.iq-desc{font-size:13px;color:var(--soft);margin:6px 0 16px;}
.iq-input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;margin-bottom:10px;}
.iq-input:focus{outline:none;border-color:var(--pink);}
textarea.iq-input{resize:vertical;}
.iq-status{font-size:12.5px;color:var(--pink-dark);min-height:16px;margin-bottom:8px;font-weight:600;}
.iq-btns{display:flex;gap:10px;}
.iq-cancel,.iq-send{flex:1;border-radius:10px;padding:12px;font-size:14px;font-weight:800;}
.iq-cancel{background:var(--line);color:var(--soft);}
.iq-send{background:var(--pink);color:#fff;}
@media(max-width:880px){.brand .logo{font-size:30px}.nav .wrap{gap:18px}}
@media(max-width:560px){.topbar .wrap{flex-wrap:wrap;justify-content:center}.social,.topbar .right{flex:none}}

/* ===== 공지 ===== */
.notice-list{display:flex;flex-direction:column;gap:10px;}
.notice-item{border:1px solid var(--line);border-radius:13px;background:var(--paper);padding:15px 18px;cursor:pointer;transition:.15s;}
.notice-item:hover{border-color:var(--pink);}
.notice-item.pinned{border-left:4px solid var(--pink);background:var(--pink-soft);}
.notice-head{display:flex;align-items:center;gap:10px;}
.notice-pin{font-size:11px;background:var(--pink);color:#fff;padding:3px 10px;border-radius:999px;font-weight:700;flex-shrink:0;}
.notice-thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;}
.notice-title{font-size:15px;font-weight:700;color:var(--ink);flex:1;}
.notice-date{font-size:12px;color:var(--soft);flex-shrink:0;}
.notice-arrow{color:var(--soft);font-size:16px;transition:transform .2s;flex-shrink:0;}
.notice-item.open .notice-arrow{transform:rotate(90deg);}
.notice-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.notice-item.open .notice-body{max-height:3000px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line);}
.notice-body .post-img{display:block;max-width:100%;border-radius:10px;margin-bottom:10px;border:1px solid var(--line);}
.notice-text{font-size:14px;line-height:1.8;color:var(--ink);white-space:pre-wrap;}
.notice-empty{text-align:center;color:var(--soft);padding:46px 0;font-family:var(--serif-ko);}
</style>
</head>
<body>
<div id="fx"></div>
<main>
  <div class="sheet">
  <header class="topbar"><div class="wrap">
    <div class="social">
      <a href="#" title="YouTube">&#9654;</a>
      <a href="https://www.sooplive.com/station/spkimnao" target="_blank" title="SOOP">S</a>
      <a href="#" title="팬심M">M</a>
      <a href="#" title="메일">&#9993;</a>
    </div>
    <div class="brand">
      <a href="../"><div class="logo">NAO<em>story</em></div></a>
      <div class="tagline">나오와 함께하는 데일리 매거진</div>
    </div>
    <div class="right">
      <button class="btn-join" onclick="openInquiry()">문의</button>
      <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환"><span class="knob" id="themeKnob">&#127769;</span></button>
    </div>
  </div></header>
  <nav class="nav"><div class="wrap">
    <a href="../">메인</a>
    <a href="../info/">프로필</a>
    <a href="index.html" class="active">공지</a>
    <a href="../schedule/">일정</a>
    <a href="../dress/">옷장</a>
    <a href="../work/">업보</a>
    <a href="../video/">영상</a>
  </div></nav>
  <div class="wrap"><div class="sections" id="mainContent" style="opacity:0;transition:opacity .3s ease">
      <div class="sec-head"><span class="en">Notice</span><span class="ko">공지</span><span class="more">NOTICE</span></div>
      <div class="notice-list" id="noticeList"><div class="notice-empty">불러오는 중…</div></div>
  </div></div>
  </div><!-- /sheet -->

  <footer>© 2026 김나오 Official.<br>비즈니스 문의 — spkimnao@gmail.com</footer>
</main>
<div class="iq-ov" id="iq-ov" onclick="if(event.target===this)closeInquiry()">
  <div class="iq-modal">
    <div class="iq-title">✉️ 문의하기</div>
    <div class="iq-desc">김나오에게 하고 싶은 말을 남겨주세요 🍀</div>
    <input class="iq-input" id="iq-nick" placeholder="닉네임 (필수)">
    <textarea class="iq-input" id="iq-msg" rows="4" placeholder="문의 내용을 적어주세요"></textarea>
    <div class="iq-status" id="iq-status"></div>
    <div class="iq-btns">
      <button class="iq-cancel" onclick="closeInquiry()">취소</button>
      <button class="iq-send" onclick="sendInquiry()">보내기 🍀</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
(function(){var b=document.getElementById('themeSwitch'),k=document.getElementById('themeKnob');if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');if(k)k.textContent=document.body.classList.contains('dark')?'☀️':'🌙';if(b)b.addEventListener('click',function(){var d=document.body.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');if(k)k.textContent=d?'☀️':'🌙';});})();
function openInquiry(){document.getElementById('iq-ov').classList.add('on');document.getElementById('iq-nick').focus();}
function closeInquiry(){document.getElementById('iq-ov').classList.remove('on');document.getElementById('iq-status').textContent='';}
async function sendInquiry(){var n=document.getElementById("iq-nick").value.trim();var m=document.getElementById("iq-msg").value.trim();var s=document.getElementById("iq-status");if(!n){if(s)s.textContent="닉네임을 입력해 주세요!";return;}if(!m){if(s)s.textContent="문의 내용을 적어주세요!";return;}if(typeof insertRow!=="function"){if(s)s.textContent="아직 서버 연결 전이에요 💙";return;}var ok=await insertRow("inquiries",{nickname:n,message:m});if(ok){if(s)s.textContent="보냈어요! 💙";document.getElementById("iq-nick").value="";document.getElementById("iq-msg").value="";setTimeout(closeInquiry,1400);}else{if(s)s.textContent="전송 실패 ㅠㅠ 잠시 후 다시 시도해 주세요";}}
(function(){var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;var fx=document.getElementById('fx');if(fx&&!reduce){var g=['✦','♡','✧','✦'];for(var i=0;i<12;i++){var s=document.createElement('span');s.className='fxfb';s.textContent=g[i%g.length];s.style.left=(Math.random()*100)+'%';s.style.fontSize=(10+Math.random()*15)+'px';s.style.animationDuration=(10+Math.random()*9)+'s';s.style.animationDelay=(-Math.random()*15)+'s';fx.appendChild(s);}}})();
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function loadNotice(){
  if(typeof fetchAll!=='function') return;
  try{
    var rows=await fetchAll('notice',{order:'created_at',asc:false});
    rows=(rows||[]).slice().sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0);});
    var el=document.getElementById('noticeList'); if(!el) return;
    if(!rows.length){el.innerHTML='<div class="notice-empty">아직 공지가 없어요 🍀</div>';return;}
    el.innerHTML=rows.map(function(n){
      var imgs = (Array.isArray(n.images) && n.images.length) ? n.images.slice() : (n.image_url ? [n.image_url] : []);
      var imghtml=imgs.map(function(u){return '<img class="post-img" src="'+esc(u)+'" referrerpolicy="no-referrer" alt="">';}).join('');
      var thumb=imgs.length?'<img class="notice-thumb" src="'+esc(imgs[0])+'" referrerpolicy="no-referrer" alt="">':'';
      var date=String(n.created_at||'').slice(0,10);
      return '<div class="notice-item'+(n.pinned?' pinned':'')+'" onclick="this.classList.toggle(\'open\')">'
        +'<div class="notice-head">'+(n.pinned?'<span class="notice-pin">📌 고정</span>':'')+thumb
        +'<span class="notice-title">'+esc(n.title)+'</span><span class="notice-date">'+esc(date)+'</span><span class="notice-arrow">›</span></div>'
        +'<div class="notice-body">'+imghtml+'<div class="notice-text">'+esc(n.content||'')+'</div></div></div>';
    }).join('');
  }catch(e){console.error('notice',e);}
}
function _reveal(){var mc=document.getElementById("mainContent");if(mc)mc.style.opacity="1";}
if(typeof fetchAll==='function') loadNotice().then(_reveal).catch(_reveal); else _reveal();
setTimeout(_reveal,1800);
</script>
<script src="../fx.js"></script>
</body>
</html>
